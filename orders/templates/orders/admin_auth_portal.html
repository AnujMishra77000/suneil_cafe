{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Access | Thathwamasi</title>
    <link rel="stylesheet" href="{% static 'orders/admin_auth.css' %}?v=20260306-auth11" />
</head>
<body>
    <main class="auth-shell auth-shell--wide">
        <section class="auth-card auth-card--portal auth-card--portal-entry">
            <div class="auth-top auth-top--center auth-top--portal">
                <div class="auth-brand-block">
                    <img class="auth-brand-logo" src="{% static 'products/images/thathwamasi-logo.png' %}" alt="Thathwamasi Bakery Cafe logo" />
                    <p class="auth-brand-name">Thathwamasi Bakery Cafe</p>
                </div>
                <h1>Admin &amp; Staff Dashboard</h1>
            </div>

            <section class="portal-grid portal-grid--cards">
                {% for card in cards %}
                <article class="portal-card portal-card--link portal-card--{{ card.slug }}" style="--card-index: {{ forloop.counter0 }};">
                    <p class="portal-card__eyebrow">{{ card.eyebrow }}</p>
                    <h2>{{ card.title }}</h2>
                    <a class="btn btn-primary" href="{{ card.url }}{% if next_url %}?next={{ next_url|urlencode }}{% endif %}">{{ card.button_label }}</a>
                </article>
                {% endfor %}
            </section>
        </section>
    </main>
</body>
</html>
