{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buy Product | Thathwamasi Bakery Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <script>
        (function () {
            const root = document.documentElement;
            root.classList.add("fx-mounted");
            window.setTimeout(function () {
                if (!root.classList.contains("fx-ready")) {
                    root.classList.remove("fx-mounted");
                }
            }, 700);
        })();
    </script>
    <link rel="stylesheet" href="{% static 'products/page_fx.css' %}?v=20260302-fx2" />
    <script defer src="{% static 'products/page_fx.js' %}?v=20260302-fx2"></script>
    <link rel="stylesheet" href="{% static 'products/buy_product.css' %}?v=20260302-buy4" />
    <link rel="stylesheet" href="{% static 'products/brand.css' %}?v=20260304-brand16" />
    <link rel="stylesheet" href="{% static 'notifications/notification_bell.css' %}?v=20260302-bell15" />
</head>
<body class="has-page-actions" data-product-id="{{ product_id }}">
    <main class="buy-wrap">
        <header class="buy-header">
            <div class="top-leading">
                <div class="site-lockup site-lockup--compact site-lockup--logo-only">
                    <img class="site-logo site-logo--compact" src="{% static 'products/images/thathwamasi-logo.png' %}" alt="Thathwamasi Bakery Cafe logo" />
                </div>
            </div>
            <div class="top-actions top-actions--icon">
                <a href="/" class="action-icon action-icon--home" aria-label="Home" title="Home"></a>
                <button id="profileBtn" class="action-icon action-icon--profile" type="button" aria-label="Save Profile (Optional)" title="Save Profile (Optional)" data-profile-ready="false"></button>
                <a href="/billing/" class="action-icon action-icon--cart" aria-label="Cart" title="Cart">
                    <span id="cartCount" class="action-icon-count">0</span>
                </a>
            </div>
        </header>
        <section class="buy-card" id="buyCard" data-fx>
            <div id="stateText" class="state">Loading product...</div>
        </section>
    </main>
    <script src="{% static 'products/buy_product.js' %}?v=20260304-profile1"></script>
    <script src="{% static 'notifications/notification_bell.js' %}?v=20260302-bell15"></script>
    <script>
        if (window.ThathwamasiNotifications) {
            window.ThathwamasiNotifications.mount({
                mode: "USER",
                storageKey: "thathwamasi_checkout_phone",
                resolveIdentifier: function () {
                    return (
                        localStorage.getItem("thathwamasi_checkout_phone") ||
                        localStorage.getItem("thathwamasi_cart_phone") ||
                        ""
                    ).trim();
                },
            });
        }
    </script>
</body>
</html>
